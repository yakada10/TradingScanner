<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — tradeUwU</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>trade<span>UwU</span></h1>
      <p>Trading Scanner & Stock Evaluator</p>
    </div>

    <div class="auth-title">Create your account</div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/signup">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input {% if error %}error{% endif %}"
               type="text" name="username" autocomplete="username"
               value="{{ username or '' }}" required autofocus
               minlength="3" maxlength="32">
        <div class="form-hint">3–32 characters, letters and numbers</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email <span style="color:var(--text-dim)">(optional)</span></label>
        <input class="form-input"
               type="email" name="email" autocomplete="email"
               value="{{ email or '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input {% if error %}error{% endif %}"
               type="password" name="password" autocomplete="new-password"
               required minlength="8">
        <div class="form-hint">At least 8 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input class="form-input {% if error %}error{% endif %}"
               type="password" name="confirm_password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="margin-top:8px">
        Create account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="/login">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
